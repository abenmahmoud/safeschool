<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem;}
.logo h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.logo p{color:#888;font-size:.875rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.5rem;}
input{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s;}
input:focus{border-color:#667eea;}
.field{margin-bottom:1.25rem;}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem;}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;padding:.75rem;border-radius:8px;margin-top:.75rem;display:none;}
.help{text-align:center;font-size:.8rem;color:#9ca3af;margin-top:1.25rem;}
.help a{color:#667eea;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">&#x1F6E1;&#xFE0F;</div>
    <h1>SafeSchool</h1>
    <p>Connexion espace administrateur</p>
  </div>
  <div class="field">
    <label>Email administrateur</label>
    <input type="email" id="email" placeholder="proviseur@etablissement.fr" autocomplete="email">
  </div>
  <div class="field">
    <label>Code d'acces</label>
    <input type="password" id="code" placeholder="Code recu (ex: SSABCD12)" autocomplete="current-password">
    <div class="hint">Code fourni lors de la creation de votre espace SafeSchool</div>
  </div>
  <button class="btn" id="btn" onclick="doLogin()">Se connecter</button>
  <div class="error" id="err"></div>
  <div class="help">Probleme ? <a href="mailto:support@safeschool.fr">support@safeschool.fr</a></div>
</div>
<script>
// Lire slug depuis URL au chargement
var _slug = new URLSearchParams(location.search).get('etab') || '';

// Permettre Entree
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  var email = document.getElementById('email').value.trim().toLowerCase();
  var code = document.getElementById('code').value.trim().toUpperCase();
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  err.style.display = 'none';
  if (!email || !code) { showErr('Remplissez tous les champs'); return; }
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  try {
    var token = null, slug = null, schoolName = null;
    // Essai 1 : avec slug en URL
    if (_slug) {
      var r1 = await fetch('/api/establishments/admin-jwt/' + _slug, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_code: code })
      });
      var d1 = await r1.json();
      if (r1.ok && d1.ok) { token = d1.token; slug = _slug; schoolName = d1.school_name; }
    }
    // Essai 2 : par email si pas de slug ou echec
    if (!token) {
      var r2 = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, admin_code: code })
      });
      var d2 = await r2.json();
      if (r2.ok && d2.ok) { token = d2.token; slug = d2.slug; schoolName = d2.school_name; }
      else { showErr(d2.error || 'Email ou code incorrect'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    }
    // Stocker et rediriger
    localStorage.setItem('ss_admin_token', token);
    localStorage.setItem('ss_admin_slug', slug);
    localStorage.setItem('ss_admin_code', code);
    localStorage.setItem('ss_admin_school', schoolName || slug);
    try {
      var pl = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (pl.city) localStorage.setItem('ss_admin_city', pl.city);
      if (pl.postal_code) localStorage.setItem('ss_admin_postal', pl.postal_code);
    } catch(e) {}
    window.location.href = '/admin/dashboard.html?etab=' + slug;
  } catch(e) {
    showErr('Erreur de connexion. Reessayez.');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}
function showErr(msg) {
  var e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
