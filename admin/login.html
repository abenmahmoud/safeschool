<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#4f46e5,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo h1{font-size:1.4rem;font-weight:700;color:#111;margin-top:.5rem}
.logo p{color:#888;font-size:.85rem}
.lbl{display:block;font-size:.8rem;font-weight:600;color:#444;margin-bottom:.4rem;margin-top:.9rem}
.inp{width:100%;padding:.75rem;border:2px solid #e5e7eb;border-radius:8px;font-size:1rem;outline:none}
.inp:focus{border-color:#4f46e5}
.btn{width:100%;padding:.85rem;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.25rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:#dc2626;font-size:.85rem;text-align:center;margin-top:.75rem;padding:.5rem;border-radius:6px;background:#fef2f2;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div style="font-size:2rem">Ã°ÂÂÂ¡Ã¯Â¸Â</div>
    <h1>SafeSchool</h1>
    <p>Espace administrateur</p>
  </div>
  <span class="lbl">Email administrateur</span>
  <input class="inp" type="email" id="f-email" placeholder="proviseur@lycee.fr" autocomplete="email">
  <span class="lbl">Code d'accÃÂ¨s</span>
  <input class="inp" type="password" id="f-code" placeholder="Code reÃÂ§u (ex: SSABCD12)" autocomplete="current-password">
  <button class="btn" id="f-btn" onclick="doLogin()">Se connecter</button>
  <div class="err" id="f-err"></div>
</div>
<script>
document.addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

async function doLogin() {
  var slug = new URLSearchParams(location.search).get('etab') || '';
  var email = (document.getElementById('f-email').value || '').trim().toLowerCase();
  var code = (document.getElementById('f-code').value || '').trim().toUpperCase();
  var btn = document.getElementById('f-btn');
  var errEl = document.getElementById('f-err');
  errEl.style.display = 'none';
  if (!email || !code) { showErr('Remplissez les deux champs'); return; }
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  try {
    var token = null, finalSlug = null, name = null;
    // Essai 1: par slug si disponible dans URL
    if (slug) {
      var r1 = await fetch('/api/establishments/admin-jwt/' + slug, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({admin_code: code})
      });
      var d1 = await r1.json();
      if (d1.ok && d1.token) { token = d1.token; finalSlug = slug; name = d1.school_name; }
    }
    // Essai 2: par email+code
    if (!token) {
      var r2 = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, admin_code: code})
      });
      var d2 = await r2.json();
      if (d2.ok && d2.token) { token = d2.token; finalSlug = d2.slug; name = d2.school_name; }
      else { showErr(d2.error || 'Email ou code incorrect'); btn.disabled=false; btn.textContent='Se connecter'; return; }
    }
    // Stocker dans localStorage ET cookie
    localStorage.setItem('ss_admin_token', token); try{var _t=(typeof data!=='undefined'&&data&&data.token)||(typeof d!=='undefined'&&d&&d.token)||(typeof d1!=='undefined'&&d1&&d1.token)||(typeof d2!=='undefined'&&d2&&d2.token)||token||'';localStorage.setItem('ss_jwt',_t);}catch(e){}
    localStorage.setItem('ss_admin_slug', finalSlug);
    localStorage.setItem('ss_admin_code', code);
    localStorage.setItem('ss_admin_school', name || finalSlug);
    document.cookie = 'ss_admin_token=' + token + '; path=/; max-age=86400; SameSite=Lax';
    // Rediriger vers dashboard
    window.location.replace('/admin/dashboard.html?etab=' + finalSlug);
  } catch(e) {
    showErr('Erreur rÃÂ©seau. RÃÂ©essayez.');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

function showErr(msg) {
  var e = document.getElementById('f-err');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
</body>
</html>
