<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem;}
.logo h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.logo p{color:#888;font-size:.875rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.5rem;}
input{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s;}
input:focus{border-color:#667eea;}
.field{margin-bottom:1.25rem;}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem;}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;padding:.75rem;border-radius:8px;margin-top:.75rem;display:none;}
.help{text-align:center;font-size:.8rem;color:#9ca3af;margin-top:1.25rem;}
.help a{color:#667eea;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>SafeSchool</h1>
    <p>Connexion espace administrateur</p>
  </div>
  <form id="loginForm" action="#" onsubmit="doLogin(event)" autocomplete="on" novalidate>
    <div class="field">
      <label for="email">Email administrateur</label>
      <input type="email" id="email" name="email" placeholder="proviseur@etablissement.fr" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="code">Code d'accès</label>
      <input type="password" id="code" name="code" placeholder="Code reçu (ex: SSABCD12)" autocomplete="current-password" required>
      <div class="hint">Code fourni lors de la création de votre espace SafeSchool</div>
    </div>
    <button type="submit" class="btn" id="btn">Se connecter</button>
    <div class="error" id="err"></div>
  </form>
  <div class="help">Problème ? <a href="mailto:support@safeschool.fr">support@safeschool.fr</a></div>
</div>
<script>
// urlSlug lu dynamiquement dans doLogin

async function doLogin(e) {
  e.preventDefault();
  const urlSlug = new URLSearchParams(location.search).get('etab') || '';
  const email = document.getElementById('email').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim().toUpperCase();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!email || !code) { showErr('Remplissez tous les champs'); return; }
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  try {
    let token = null, slug = null, schoolName = null;
    // Essai 1 : avec le slug en URL (plus rapide)
    if (urlSlug) {
      const r = await fetch('/api/establishments/admin-jwt/' + urlSlug, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ admin_code: code })
      });
      const d = await r.json();
      if (r.ok && d.ok) { token = d.token; slug = urlSlug; schoolName = d.school_name; }
    }
    // Essai 2 : par email + code (sans slug)
    if (!token) {
      const r2 = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, admin_code: code })
      });
      const d2 = await r2.json();
      if (r2.ok && d2.ok) { token = d2.token; slug = d2.slug; schoolName = d2.school_name; }
      else { showErr(d2.error || 'Email ou code incorrect'); btn.disabled=false; btn.textContent='Se connecter'; return; }
    }
    // Succès — stocker et rediriger
    localStorage.setItem('ss_admin_token', token);
    localStorage.setItem('ss_admin_slug', slug);
    localStorage.setItem('ss_admin_code', code);
    localStorage.setItem('ss_admin_school', schoolName || slug);
    try {
      const pl = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (pl.city) localStorage.setItem('ss_admin_city', pl.city);
      if (pl.postal_code) localStorage.setItem('ss_admin_postal', pl.postal_code);
    } catch(_) {}
    location.href = '/admin/dashboard.html?etab=' + slug;
  } catch(_) {
    showErr('Erreur de connexion. Réessayez.');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}
function showErr(msg) { const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
</script>
</body>
</html>
