<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e3a5f 0%,#2d6a4f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:2rem}
.logo-box{width:60px;height:60px;background:linear-gradient(135deg,#1e3a5f,#2d6a4f);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem}
h1{font-size:1.5rem;font-weight:700;color:#111}
.subtitle{color:#888;font-size:.875rem;margin-top:.25rem}
label{display:block;font-size:.8rem;font-weight:600;color:#555;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:12px;font-size:.95rem;transition:border .15s;background:#f9fafb;color:#111}
input:focus{outline:none;border-color:#1e3a5f;background:#fff}
.field{margin-bottom:1.25rem}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#1e3a5f,#2d6a4f);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:.6rem .875rem;font-size:.85rem;margin-top:.75rem;display:none}
.help{text-align:center;font-size:.78rem;color:#aaa;margin-top:1.25rem}
.help a{color:#1e3a5f;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box">🛡️</div>
    <h1>SafeSchool</h1>
    <p class="subtitle">Espace administration établissement</p>
  </div>
  <form id="loginForm" onsubmit="doLogin(event)" autocomplete="on" novalidate>
    <div class="field">
      <label for="email">Email administrateur</label>
      <input type="email" id="email" name="email" placeholder="proviseur@etablissement.fr" autocomplete="email" required>
    </div>
    <div class="field">
      <label for="code">Code d'accès</label>
      <input type="password" id="code" name="code" placeholder="Code fourni par SafeSchool" autocomplete="current-password" required>
      <div class="hint">Code transmis par SafeSchool lors de la création de votre espace (ex : SSABCD12)</div>
    </div>
    <button class="btn" type="submit" id="btn">Se connecter</button>
    <div class="err" id="err"></div>
  </form>
  <p class="help">Problème de connexion ? <a href="mailto:contact@safeschool.fr">Contactez le support</a></p>
</div>
<script>
const params = new URLSearchParams(location.search);
const urlSlug = params.get('etab') || '';
const urlEmail = params.get('email') || '';
if (urlEmail) document.getElementById('email').value = urlEmail;

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim().toUpperCase();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!email || !code) { showErr('Remplissez tous les champs'); return; }
  btn.disabled = true;
  btn.textContent = 'Connexion en cours...';
  err.style.display = 'none';
  try {
    let data = null;
    // Si slug dans URL : login direct par slug + code
    if (urlSlug) {
      const r = await fetch('/api/establishments/admin-jwt/' + urlSlug, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_code: code })
      });
      const d = await r.json();
      if (r.ok && d.ok) { data = { ...d, slug: urlSlug }; }
      else { showErr('Code incorrect. Vérifiez le code transmis par SafeSchool.'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    } else {
      // Login par email + code
      const r = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, admin_code: code })
      });
      const d = await r.json();
      if (r.ok && d.ok) { data = d; }
      else { showErr(d.error || 'Email ou code incorrect.'); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    }
    // Sauvegarder et rediriger
    localStorage.setItem('ss_admin_token', data.token);
    localStorage.setItem('ss_admin_slug', data.slug);
    localStorage.setItem('ss_admin_school', data.school_name || data.slug);
    localStorage.setItem('ss_admin_email', email);
    try {
      const pl = JSON.parse(atob(data.token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (pl.school_id) localStorage.setItem('ss_admin_school_id', pl.school_id);
    } catch(e) {}
    window.location.href = '/admin/dashboard.html?etab=' + (data.slug || urlSlug);
  } catch(ex) {
    showErr('Erreur de connexion. Réessayez.');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}
function showErr(msg) { const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block'; }
</script>
</body>
</html>
