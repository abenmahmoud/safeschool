<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Connexion Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:16px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 2px 20px rgba(0,0,0,.08);}
.logo{text-align:center;margin-bottom:2rem;}
.logo h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.logo p{color:#666;font-size:.9rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:500;color:#444;margin-bottom:.4rem;}
input{width:100%;padding:.75rem 1rem;border:1.5px solid #e0e0e0;border-radius:10px;font-size:1rem;outline:none;transition:border .2s;}
input:focus{border-color:#4f46e5;}
.field{margin-bottom:1.25rem;}
button{width:100%;padding:.85rem;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;}
button:hover{background:#4338ca;}
button:disabled{background:#9ca3af;}
.error{color:#dc2626;font-size:.85rem;text-align:center;margin-top:.75rem;display:none;}
.shield{font-size:2rem;margin-bottom:.5rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="shield">🛡️</div>
    <h1>SafeSchool</h1>
    <p>Espace administration sécurisé</p>
  </div>
  <div class="field">
    <label for="slug">Identifiant établissement</label>
    <input type="text" id="slug" placeholder="ex: lycee-victor-hugo" autocomplete="off">
  </div>
  <div class="field">
    <label for="code">Code d'accès</label>
    <input type="password" id="code" placeholder="••••••••">
  </div>
  <button id="btn" onclick="doLogin()">Se connecter</button>
  <div class="error" id="err"></div>
</div>
<script>
// Lire slug depuis URL si présent
const urlSlug = new URLSearchParams(location.search).get('etab');
if(urlSlug) document.getElementById('slug').value = urlSlug;

async function doLogin(){
  const slug = document.getElementById('slug').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if(!slug || !code){ showErr('Remplissez tous les champs'); return; }
  btn.disabled = true; btn.textContent = 'Connexion...'; err.style.display='none';
  try {
    const r = await fetch('/api/establishments/admin-jwt/' + slug, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({admin_code: code})
    });
    const d = await r.json();
    if(r.ok && d.ok){
      localStorage.setItem('ss_admin_token', d.token);
      localStorage.setItem('ss_admin_slug', slug);
      localStorage.setItem('ss_admin_code', code);
      localStorage.setItem('ss_admin_school', d.school_name);
      localStorage.setItem('ss_admin_role', d.role);
      location.href = '/admin/dashboard.html?etab=' + slug;
    } else {
      showErr(d.error || 'Code incorrect');
    }
  } catch(e) {
    showErr('Erreur de connexion. Réessayez.');
  }
  btn.disabled = false; btn.textContent = 'Se connecter';
}
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
