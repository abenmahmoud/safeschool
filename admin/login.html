<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:2rem;}
.icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem;color:#fff;font-weight:700;line-height:1;}
label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.5rem;}
input{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s;background:#fafafa;}
input:focus{border-color:#667eea;background:#fff;}
.field{margin-bottom:1.25rem;}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem;}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;padding:.75rem;border-radius:8px;margin-top:.75rem;display:none;}
.help{text-align:center;font-size:.8rem;color:#9ca3af;margin-top:1.25rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">SS</div>
    <h1 style="font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-top:.5rem">SafeSchool</h1>
    <p style="color:#888;font-size:.875rem;margin-top:.25rem">Connexion espace administrateur</p>
  </div>
  <div class="field">
    <label>Email administrateur</label>
    <input type="email" id="em" placeholder="proviseur@etablissement.fr">
  </div>
  <div class="field">
    <label>Code d'acc&egrave;s</label>
    <input type="password" id="cd" placeholder="Ex: SSABCD12">
    <div class="hint">Code fourni lors de la cr&eacute;ation de votre espace</div>
  </div>
  <button class="btn" id="btn" onclick="login()">Se connecter</button>
  <div class="err" id="err"></div>
  <div class="help">Probl&egrave;me ? support@safeschool.fr</div>
</div>
<script>
var SL = new URLSearchParams(location.search).get('etab') || '';
document.getElementById('cd').onkeydown = function(e){ if(e.key==='Enter') login(); };
document.getElementById('em').onkeydown = function(e){ if(e.key==='Enter') login(); };

function login(){
  var em = document.getElementById('em').value.trim().toLowerCase();
  var cd = document.getElementById('cd').value.trim().toUpperCase();
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  err.style.display='none';
  if(!em||!cd){err.textContent='Remplissez tous les champs';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Connexion...';
  var p1 = SL ? fetch('/api/establishments/admin-jwt/'+SL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_code:cd})}).then(function(r){return r.json().then(function(d){return {ok:r.ok&&d.ok,token:d.token,slug:SL,name:d.school_name,err:d.error};});}).catch(function(){return {ok:false};}) : Promise.resolve({ok:false});
  p1.then(function(d1){
    if(d1.ok){done(d1);return;}
    fetch('/api/establishments/admin-jwt-by-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,admin_code:cd})}).then(function(r){return r.json().then(function(d){return {ok:r.ok&&d.ok,token:d.token,slug:d.slug,name:d.school_name,err:d.error};});}).then(function(d2){
      if(d2.ok){done(d2);}
      else{err.textContent=d2.err||'Email ou code incorrect';err.style.display='block';btn.disabled=false;btn.textContent='Se connecter';}
    }).catch(function(){err.textContent='Erreur reseau';err.style.display='block';btn.disabled=false;btn.textContent='Se connecter';});
  });
}

function done(d){
  localStorage.setItem('ss_admin_token',d.token);
  localStorage.setItem('ss_admin_slug',d.slug);
  localStorage.setItem('ss_admin_school',d.name||d.slug);
  try{var pl=JSON.parse(atob(d.token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));if(pl.school_id)localStorage.setItem('ss_admin_school_id',pl.school_id);}catch(_){}
  window.location.href='/admin/dashboard.html?etab='+d.slug;
}
</script>
</body>
</html>
