<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Connexion Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.5rem;}
.logo h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.logo p{color:#888;font-size:.9rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#444;margin-bottom:.4rem;}
input{width:100%;padding:.8rem 1rem;border:2px solid #e8e8e8;border-radius:12px;font-size:1rem;outline:none;transition:border .2s,box-shadow .2s;background:#fafafa;}
input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1);background:#fff;}
.field{margin-bottom:1.25rem;}
.hint{font-size:.75rem;color:#aaa;margin-top:.35rem;}
button{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:.5rem;}
button:hover{opacity:.9;}
button:active{transform:scale(.99);}
button:disabled{opacity:.6;cursor:not-allowed;}
.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;margin-top:.75rem;padding:.6rem;border-radius:8px;display:none;}
.divider{text-align:center;color:#ccc;font-size:.8rem;margin:1.5rem 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#eee;}
.divider::before{left:0;} .divider::after{right:0;}
.help{text-align:center;font-size:.8rem;color:#aaa;margin-top:1rem;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>SafeSchool</h1>
    <p>Espace administration</p>
  </div>
  <div class="field">
    <label for="email">Email administrateur</label>
    <input type="email" id="email" placeholder="proviseur@etablissement.fr" autocomplete="email">
  </div>
  <div class="field">
    <label for="code">Code d'accès</label>
    <input type="password" id="code" placeholder="Code reçu du fondateur (ex: SSABCD12)">
    <div class="hint">Code fourni par SafeSchool lors de la création de votre espace</div>
  </div>
  <button id="btn" onclick="doLogin()">Se connecter</button>
  <div class="error" id="err"></div>
  <div class="help">Problème de connexion ? <a href="mailto:support@safeschool.fr" style="color:#667eea">Contactez le support</a></div>
</div>
<script>
// Pré-remplir depuis URL
const params = new URLSearchParams(location.search);
const urlSlug = params.get('etab') || '';
const urlEmail = params.get('email') || '';
if(urlEmail) document.getElementById('email').value = urlEmail;

async function doLogin(){
  const email = document.getElementById('email').value.trim().toLowerCase();
  const code = document.getElementById('code').value.trim().toUpperCase();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if(!email || !code){ showErr('Remplissez tous les champs'); return; }
  btn.disabled = true; btn.textContent = 'Connexion...'; err.style.display='none';
  try {
    // Si on a le slug en URL, utiliser directement
    if(urlSlug) {
      const r = await fetch('/api/establishments/admin-jwt/' + urlSlug, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({admin_code: code})
      });
      const d = await r.json();
      if(r.ok && d.ok){ saveAndRedirect(d, urlSlug, code); return; }
    }
    // Sinon chercher l'école par email via Supabase
    const r2 = await fetch('/api/establishments/admin-jwt-by-email', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, admin_code: code})
    });
    const d2 = await r2.json();
    if(r2.ok && d2.ok){ saveAndRedirect(d2, d2.slug, code); return; }
    showErr(d2.error || 'Email ou code incorrect');
  } catch(e){ showErr('Erreur de connexion. Réessayez.'); }
  btn.disabled = false; btn.textContent = 'Se connecter';
}
function saveAndRedirect(d, slug, code){
  localStorage.setItem('ss_admin_token', d.token);
  localStorage.setItem('ss_admin_slug', slug);
  localStorage.setItem('ss_admin_code', code);
  localStorage.setItem('ss_admin_school', d.school_name || slug);
  try {
    const pl = JSON.parse(atob(d.token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if(pl.city) localStorage.setItem('ss_admin_city', pl.city);
    if(pl.postal_code) localStorage.setItem('ss_admin_postal', pl.postal_code);
  } catch(e){}
  location.href = '/admin/dashboard.html?etab=' + slug;
}
function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
