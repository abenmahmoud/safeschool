<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:2rem;}
.icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem;line-height:1;}
h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.sub{color:#888;font-size:.875rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.5rem;}
input{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s;background:#fff;}
input:focus{border-color:#667eea;}
.field{margin-bottom:1.25rem;}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem;}
.btn{width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:.5rem;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;padding:.75rem;border-radius:8px;margin-top:.75rem;display:none;}
.help{text-align:center;font-size:.8rem;color:#9ca3af;margin-top:1.25rem;}
.help a{color:#667eea;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">&#128737;</div>
    <h1>SafeSchool</h1>
    <div class="sub">Connexion espace administrateur</div>
  </div>
  <div class="field">
    <label>Email administrateur</label>
    <input type="email" id="em" placeholder="proviseur@etablissement.fr" autocomplete="email">
  </div>
  <div class="field">
    <label>Code d acces</label>
    <input type="password" id="co" placeholder="Code recu (ex: SSABCD12)" autocomplete="current-password">
    <div class="hint">Code fourni lors de la creation de votre espace SafeSchool</div>
  </div>
  <button class="btn" id="bt" onclick="go()">Se connecter</button>
  <div class="err" id="er"></div>
  <div class="help">Probleme ? <a href="mailto:support@safeschool.fr">support@safeschool.fr</a></div>
</div>
<script>
var SL = new URLSearchParams(location.search).get('etab') || '';
document.addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
async function go(){
  var em = document.getElementById('em').value.trim().toLowerCase();
  var co = document.getElementById('co').value.trim().toUpperCase();
  var bt = document.getElementById('bt');
  var er = document.getElementById('er');
  er.style.display='none';
  if(!em||!co){ er.textContent='Remplissez tous les champs'; er.style.display='block'; return; }
  bt.disabled=true; bt.textContent='Connexion...';
  try {
    var tok=null, sl=SL, nm=null;
    if(sl){
      var r1=await fetch('/api/establishments/admin-jwt/'+sl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({admin_code:co})});
      var d1=await r1.json();
      if(r1.ok&&d1.ok){tok=d1.token;nm=d1.school_name;}
    }
    if(!tok){
      var r2=await fetch('/api/establishments/admin-jwt-by-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,admin_code:co})});
      var d2=await r2.json();
      if(r2.ok&&d2.ok){tok=d2.token;sl=d2.slug;nm=d2.school_name;}
      else{er.textContent=d2.error||'Email ou code incorrect';er.style.display='block';bt.disabled=false;bt.textContent='Se connecter';return;}
    }
    localStorage.setItem('ss_admin_token',tok);
    localStorage.setItem('ss_admin_slug',sl);
    localStorage.setItem('ss_admin_code',co);
    localStorage.setItem('ss_admin_school',nm||sl);
    window.location.href='/admin/dashboard.html?etab='+sl;
  } catch(e){
    er.textContent='Erreur reseau. Reessayez.';
    er.style.display='block';
    bt.disabled=false;
    bt.textContent='Se connecter';
  }
}
</script>
</body>
</html>
