<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#4f46e5,#7c3aed);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.box{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.logo{text-align:center;margin-bottom:1.5rem}
.logo h1{font-size:1.4rem;font-weight:700;color:#111;margin-top:.5rem}
.logo p{color:#888;font-size:.85rem}
label{display:block;font-size:.8rem;font-weight:600;color:#444;margin-bottom:.4rem}
input{width:100%;padding:.75rem;border:2px solid #e5e7eb;border-radius:8px;font-size:1rem;outline:none;margin-bottom:1rem}
input:focus{border-color:#4f46e5}
.btn{width:100%;padding:.8rem;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5}
.err{color:#dc2626;font-size:.85rem;text-align:center;margin-top:.75rem;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div style="font-size:2rem">🛡️</div>
    <h1>SafeSchool</h1>
    <p>Espace administrateur</p>
  </div>
  <label for="inp-email">Email administrateur</label>
  <input type="email" id="inp-email" placeholder="proviseur@lycee.fr" autocomplete="email">
  <label for="inp-code">Code d'accès</label>
  <input type="password" id="inp-code" placeholder="Code reçu (ex: SSABCD12)" autocomplete="current-password">
  <button class="btn" id="inp-btn" onclick="tryLogin()">Se connecter</button>
  <div class="err" id="inp-err"></div>
</div>
<script>
var _slug = new URLSearchParams(location.search).get('etab') || '';

async function tryLogin() {
  var email = document.getElementById('inp-email').value.trim().toLowerCase();
  var code = document.getElementById('inp-code').value.trim().toUpperCase();
  var btn = document.getElementById('inp-btn');
  var err = document.getElementById('inp-err');
  err.style.display = 'none';
  if (!email || !code) { err.textContent = 'Remplissez les deux champs'; err.style.display = 'block'; return; }
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  try {
    var token = null, slug = null, name = null;
    if (_slug) {
      var r1 = await fetch('/api/establishments/admin-jwt/' + _slug, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({admin_code: code})
      });
      var d1 = await r1.json();
      if (r1.ok && d1.ok) { token = d1.token; slug = _slug; name = d1.school_name; }
    }
    if (!token) {
      var r2 = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email: email, admin_code: code})
      });
      var d2 = await r2.json();
      if (r2.ok && d2.ok) { token = d2.token; slug = d2.slug; name = d2.school_name; }
      else { err.textContent = d2.error || 'Email ou code incorrect'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    }
    localStorage.setItem('ss_admin_token', token);
    localStorage.setItem('ss_admin_slug', slug);
    localStorage.setItem('ss_admin_code', code);
    localStorage.setItem('ss_admin_school', name || slug);
    location.href = '/admin/dashboard.html?etab=' + slug;
  } catch(e) {
    err.textContent = 'Erreur reseau. Reessayez.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}
document.addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });
</script>
</body>
</html>
