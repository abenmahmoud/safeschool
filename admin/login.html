<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool — Espace Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.logo{text-align:center;margin-bottom:2rem;}
.icon{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.75rem;line-height:56px;text-align:center;}
h1{font-size:1.5rem;font-weight:700;color:#1a1a2e;}
.sub{color:#888;font-size:.875rem;margin-top:.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:.5rem;margin-top:1.25rem;}
input[type=email],input[type=password]{width:100%;padding:.8rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:1rem;outline:none;transition:border-color .2s;background:#fff;}
input[type=email]:focus,input[type=password]:focus{border-color:#667eea;}
.hint{font-size:.75rem;color:#9ca3af;margin-top:.35rem;}
.btn{display:block;width:100%;padding:.9rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.5rem;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.85rem;text-align:center;padding:.75rem;border-radius:8px;margin-top:.75rem;display:none;}
.help{text-align:center;font-size:.8rem;color:#9ca3af;margin-top:1.25rem;}
.help a{color:#667eea;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">&#x1F6E1;&#xFE0F;</div>
    <h1>SafeSchool</h1>
    <p class="sub">Connexion espace administrateur</p>
  </div>
  <label for="em">Email administrateur</label>
  <input type="email" id="em" placeholder="proviseur@etablissement.fr" autocomplete="email">
  <label for="cd">Code d'acc&#232;s</label>
  <input type="password" id="cd" placeholder="Code fourni (ex: SSABCD12)" autocomplete="current-password">
  <div class="hint">Code fourni par SafeSchool lors de la cr&#233;ation de votre espace</div>
  <button class="btn" id="btn" onclick="go()">Se connecter</button>
  <div class="err" id="err"></div>
  <div class="help">Probl&#232;me ? <a href="mailto:support@safeschool.fr">support@safeschool.fr</a></div>
</div>
<script>
var urlSlug = new URLSearchParams(location.search).get('etab') || '';
document.getElementById('cd').addEventListener('keydown', function(e){ if(e.key==='Enter') go(); });
document.getElementById('em').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('cd').focus(); });

async function go() {
  var email = document.getElementById('em').value.trim().toLowerCase();
  var code = document.getElementById('cd').value.trim().toUpperCase();
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');
  err.style.display = 'none';
  if (!email || !code) { showErr('Remplissez tous les champs'); return; }
  btn.disabled = true; btn.textContent = 'Connexion...';
  try {
    var token = null, slug = null, name = null;
    if (urlSlug) {
      var r1 = await fetch('/api/establishments/admin-jwt/' + urlSlug, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ admin_code: code })
      });
      var d1 = await r1.json();
      if (r1.ok && d1.ok) { token = d1.token; slug = urlSlug; name = d1.school_name; }
    }
    if (!token) {
      var r2 = await fetch('/api/establishments/admin-jwt-by-email', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email: email, admin_code: code })
      });
      var d2 = await r2.json();
      if (r2.ok && d2.ok) { token = d2.token; slug = d2.slug; name = d2.school_name; }
      else { showErr(d2.error || 'Email ou code incorrect'); btn.disabled=false; btn.textContent='Se connecter'; return; }
    }
    localStorage.setItem('ss_admin_token', token);
    localStorage.setItem('ss_admin_slug', slug);
    localStorage.setItem('ss_admin_code', code);
    localStorage.setItem('ss_admin_school', name || slug);
    window.location.href = '/admin/dashboard.html?etab=' + slug;
  } catch(e) {
    showErr('Erreur de connexion. Réessayez.');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}
function showErr(msg) { var e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; }
</script>
</body>
</html>
