<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeSchool Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#111}
.bar{background:#1a1a2e;color:#fff;padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.bar h1{font-size:1rem;font-weight:700}
.bar .rt{display:flex;align-items:center;gap:1rem;font-size:.85rem;color:#a5b4fc}
.bar button{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:.35rem .8rem;border-radius:6px;cursor:pointer}
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.875rem;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:1rem 1.25rem;border:1px solid #e5e7eb}
.stat .n{font-size:1.875rem;font-weight:700}.stat .l{font-size:.75rem;color:#6b7280;margin-top:.15rem}
.sn .n{color:#2563eb}.su .n{color:#dc2626}
.fi{display:flex;gap:.625rem;margin-bottom:.875rem;flex-wrap:wrap}
.fi select,.fi input{padding:.45rem .8rem;border:1px solid #d1d5db;border-radius:7px;font-size:.875rem;background:#fff;outline:none}
.fi input{flex:1;min-width:180px}
.lst{display:flex;flex-direction:column;gap:.625rem}
.cd{background:#fff;border-radius:10px;padding:1.125rem;border:1px solid #e5e7eb;cursor:pointer}
.cd:hover{box-shadow:0 4px 16px rgba(0,0,0,.09)}
.r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.4rem}
.cc{font-size:.7rem;font-family:monospace;color:#9ca3af;font-weight:600}
.ct{font-size:.95rem;font-weight:600}
.cx{font-size:.875rem;color:#4b5563;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:520px}
.tg{display:flex;gap:.45rem;margin-top:.5rem;flex-wrap:wrap}
.tg span{display:inline-flex;align-items:center;padding:.175rem .55rem;border-radius:20px;font-size:.7rem;font-weight:500}
.tnew{background:#dbeafe;color:#1d4ed8}.tpg{background:#fef3c7;color:#92400e}.tdn{background:#d1fae5;color:#065f46}.tan{background:#f3f4f6;color:#4b5563}.tug{background:#fee2e2;color:#991b1b}
.dt{font-size:.75rem;color:#9ca3af;white-space:nowrap}
.mt{text-align:center;padding:3rem;color:#9ca3af}.sp{text-align:center;padding:2.5rem;color:#6b7280}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:1.5rem}
.ov.on{display:flex;align-items:flex-start;justify-content:center}
.mb{background:#fff;border-radius:14px;width:100%;max-width:660px;overflow:hidden}
.mh{background:#1a1a2e;color:#fff;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center}
.mh h2{font-size:1rem}.mh button{background:transparent;border:none;color:#fff;font-size:1.3rem;cursor:pointer}
.mc{padding:1.25rem}
.fl{margin-bottom:.875rem}.fl label{display:block;font-size:.7rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem}.fl p{font-size:.9rem}
.sb{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.5rem}
.sb button{padding:.4rem .875rem;border-radius:7px;border:1.5px solid #d1d5db;background:#fff;cursor:pointer;font-size:.82rem;font-weight:500}
.sb button.on{border-color:#4f46e5;background:#ede9fe;color:#4f46e5}
textarea{width:100%;padding:.65rem;border:1.5px solid #d1d5db;border-radius:7px;font-size:.875rem;resize:vertical;min-height:80px;margin-top:.5rem}
textarea:focus{outline:none;border-color:#4f46e5}
.sv{margin-top:.5rem;padding:.55rem 1.125rem;background:#4f46e5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-weight:500}
.ub{display:inline-block;padding:.2rem .6rem;border-radius:6px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.ub.critique{background:#fee2e2;color:#991b1b}.ub.eleve{background:#ffedd5;color:#9a3412}.ub.moyen{background:#fef3c7;color:#92400e}.ub.faible{background:#f0fdf4;color:#166534}
</style></head><body>
<div class="bar">
<h1>&#128737;&#65039; SafeSchool</h1>
<div class="rt"><span id="snm"></span><button onclick="doOut()">D&#233;connexion</button></div>
</div>
<div class="wrap">
<div class="stats">
<div class="stat"><div class="n" id="c0">&#8212;</div><div class="l">Total</div></div>
<div class="stat sn"><div class="n" id="c1">&#8212;</div><div class="l">Nouveaux</div></div>
<div class="stat"><div class="n" id="c2">&#8212;</div><div class="l">En cours</div></div>
<div class="stat"><div class="n" id="c3">&#8212;</div><div class="l">R&#233;solus</div></div>
<div class="stat su"><div class="n" id="c4">&#8212;</div><div class="l">Urgents</div></div>
</div>
<div class="fi">
<select id="fst" onchange="doLoad()"><option value="">Tous statuts</option><option value="nouveau">Nouveaux</option><option value="en_cours">En cours</option><option value="resolu">R&#233;solus</option></select>
<select id="ftp" onchange="doLoad()"><option value="">Tous types</option><option value="physique">Physique</option><option value="verbal">Verbal</option><option value="exclusion">Exclusion</option><option value="autre">Autre</option></select>
<select id="fug" onchange="doLoad()"><option value="">Toutes urgences</option><option value="critique">Critique</option><option value="eleve">&#201;lev&#233;e</option><option value="moyen">Moyenne</option><option value="faible">Faible</option></select>
<input type="text" id="fq" placeholder="Rechercher..." oninput="doFil()">
</div>
<div class="lst" id="lst"><div class="sp">Chargement...</div></div>
</div>
<div class="ov" id="ov" onclick="if(event.target===this)doCl()">
<div class="mb"><div class="mh"><h2 id="omtit">Signalement</h2><button onclick="doCl()">&#x2715;</button></div>
<div class="mc" id="ombod"></div></div>
</div>
<script>
var _t=localStorage.getItem("ss_admin_token")||"";
var _s=localStorage.getItem("ss_admin_slug")||new URLSearchParams(location.search).get("etab")||"";
var _nm=localStorage.getItem("ss_admin_school")||_s;
var _sid="";var _all=[];
var SU="https://bsytkpgdxvlddzuwaabp.supabase.co";
var SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzeXRrcGdkeHZsZGR6dXdhYWJwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTIwNjU1MiwiZXhwIjoyMDkwNzgyNTUyfQ.BdAhL5ammViYicizJjmmQxELcZore8LUQc5mR1giS7A";
if(!_t||!_s){location.href="/admin/login";}
try{var _p=JSON.parse(atob(_t.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));_sid=_p.school_id||"";}catch(e){}
document.getElementById("snm").textContent=_nm;
var TL={physique:"Physique",verbal:"Verbal",exclusion:"Exclusion",autre:"Autre"};
var SN={nouveau:"Nouveau",en_cours:"En cours",resolu:"Resolu"};
var SC={nouveau:"tnew",en_cours:"tpg",resolu:"tdn"};
function ago(d){var m=Math.floor((Date.now()-new Date(d))/60000);if(m<1)return"instant";if(m<60)return m+"min";if(m<1440)return Math.floor(m/60)+"h";return Math.floor(m/1440)+"j";}
function doLoad(){
  if(!_sid){document.getElementById("lst").innerHTML="<div class=\"mt\">Erreur: reconnectez-vous</div>";return;}
  var st=document.getElementById("fst").value;
  var tp=document.getElementById("ftp").value;
  var ug=document.getElementById("fug").value;
  var url=SU+"/rest/v1/reports?school_id=eq."+_sid+"&order=created_at.desc&limit=500";
  if(st)url+="&status=eq."+st;
  if(tp)url+="&type=eq."+tp;
  if(ug)url+="&urgency=eq."+ug;
  fetch(url,{headers:{apikey:SK,Authorization:"Bearer "+SK}}).then(function(r){return r.json();}).then(function(data){
    if(!Array.isArray(data)){document.getElementById("lst").innerHTML="<div class=\"mt\">Erreur: "+JSON.stringify(data).substring(0,80)+"</div>";return;}
    _all=data;doRen(_all);
    document.getElementById("c0").textContent=_all.length;
    document.getElementById("c1").textContent=_all.filter(function(x){return x.status==="nouveau";}).length;
    document.getElementById("c2").textContent=_all.filter(function(x){return x.status==="en_cours";}).length;
    document.getElementById("c3").textContent=_all.filter(function(x){return x.status==="resolu";}).length;
    document.getElementById("c4").textContent=_all.filter(function(x){return x.urgency==="critique"||x.urgency==="eleve";}).length;
  }).catch(function(e){document.getElementById("lst").innerHTML="<div class=\"mt\">Erreur: "+e.message+"</div>";});
}
function doFil(){var q=document.getElementById("fq").value.toLowerCase();doRen(q?_all.filter(function(r){return(r.description||"").toLowerCase().indexOf(q)>-1||(r.tracking_code||"").toLowerCase().indexOf(q)>-1;}):_all);}
function doRen(lst){
  var el=document.getElementById("lst");
  if(!lst.length){el.innerHTML="<div class=\"mt\">Aucun signalement</div>";return;}
  var h="";
  for(var i=0;i<lst.length;i++){var r=lst[i];
    h+="<div class=\"cd\" onclick=\"doOp('"+r.id+"')\">";
    h+="<div class=\"r1\"><div><div class=\"cc\">"+(r.tracking_code||"")+"</div>";
    h+="<div class=\"ct\">"+(TL[r.type]||r.type||"Autre")+"</div></div>";
    h+="<div class=\"dt\">"+ago(r.created_at)+"</div></div>";
    h+="<div class=\"cx\">"+(r.description||"(aucune description)")+"</div>";
    h+="<div class=\"tg\"><span class=\""+(SC[r.status]||"tnew")+"\">"+( SN[r.status]||r.status)+"</span>";
    if(r.urgency&&r.urgency!=="faible")h+="<span class=\"tug\">"+r.urgency+"</span>";
    if(r.anonymous)h+="<span class=\"tan\">Anonyme</span>";
    if(r.reporter_role)h+="<span class=\"tan\">"+r.reporter_role+"</span>";
    h+="</div></div>";
  }
  el.innerHTML=h;
}
function doOp(id){
  var r=null;for(var i=0;i<_all.length;i++)if(_all[i].id===id){r=_all[i];break;}
  if(!r)return;
  document.getElementById("omtit").textContent=r.tracking_code||"Signalement";
  document.getElementById("ov").className="ov on";
  var h="";
  h+="<div class=\"fl\"><label>Code</label><p style=\"font-family:monospace\">"+(r.tracking_code||"")+"</p></div>";
  h+="<div class=\"fl\"><label>Type</label><p>"+(TL[r.type]||r.type||"")+"</p></div>";
  h+="<div class=\"fl\"><label>Urgence</label><p><span class=\"ub "+(r.urgency||"faible")+"\">"+( r.urgency||"faible")+"</span></p></div>";
  h+="<div class=\"fl\"><label>Description</label><p style=\"white-space:pre-wrap\">"+(r.description||"")+"</p></div>";
  if(r.location)h+="<div class=\"fl\"><label>Lieu</label><p>"+r.location+"</p></div>";
  h+="<div class=\"fl\"><label>Role</label><p>"+(r.reporter_role||"non renseign&#233;")+"</p></div>";
  h+="<div class=\"fl\"><label>Anonyme</label><p>"+(r.anonymous?"Oui":"Non")+"</p></div>";
  if(r.reporter_email)h+="<div class=\"fl\"><label>Email</label><p>"+r.reporter_email+"</p></div>";
  if(r.classe)h+="<div class=\"fl\"><label>Classe</label><p>"+r.classe+"</p></div>";
  h+="<div class=\"fl\"><label>Re&#231;u le</label><p>"+new Date(r.created_at).toLocaleString("fr-FR")+"</p></div>";
  var s1=r.status==="nouveau"?"on":"";var s2=r.status==="en_cours"?"on":"";var s3=r.status==="resolu"?"on":"";
  h+="<div class=\"fl\"><label>Statut</label><div class=\"sb\">";
  h+="<button class=\""+s1+"\" onclick=\"doSt('"+id+"','nouveau')\" >Nouveau</button>";
  h+="<button class=\""+s2+"\" onclick=\"doSt('"+id+"','en_cours')\" >En cours</button>";
  h+="<button class=\""+s3+"\" onclick=\"doSt('"+id+"','resolu')\" >R&#233;solu</button>";
  h+="</div></div>";
  h+="<div class=\"fl\"><label>R&#233;ponse</label>";
  h+="<textarea id=\"rep\">"+(r.admin_reply||"")+"</textarea>";
  h+="<button class=\"sv\" onclick=\"doSv('"+id+"')\" >Enregistrer</button></div>";
  document.getElementById("ombod").innerHTML=h;
}
function doSt(id,s){
  fetch(SU+"/rest/v1/reports?id=eq."+id,{method:"PATCH",headers:{apikey:SK,Authorization:"Bearer "+SK,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({status:s,updated_at:new Date().toISOString()})}).then(function(){
    for(var i=0;i<_all.length;i++)if(_all[i].id===id){_all[i].status=s;break;}
    doRen(_all);doOp(id);
  });
}
function doSv(id){
  var v=document.getElementById("rep").value;
  fetch(SU+"/rest/v1/reports?id=eq."+id,{method:"PATCH",headers:{apikey:SK,Authorization:"Bearer "+SK,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({admin_reply:v,updated_at:new Date().toISOString()})}).then(function(){
    for(var i=0;i<_all.length;i++)if(_all[i].id===id){_all[i].admin_reply=v;break;}
    alert("Enregistr&#233; !");
  });
}
function doCl(){document.getElementById("ov").className="ov";}
function doOut(){localStorage.clear();document.cookie="ss_admin_token=; path=/; max-age=0";location.href="/admin/login";}
doLoad();setInterval(doLoad,30000);
</script></body></html>
