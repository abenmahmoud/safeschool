[build]
publish = "."
functions = "netlify/functions"
edge_functions = "netlify/edge-functions"

  [build.environment]
  NODE_VERSION = "18"

  [build.processing]

    [build.processing.css]

    [build.processing.html]

    [build.processing.images]

    [build.processing.js]

  [build.services]

[[edge_functions]]
  path = "/*"
  function = "subdomain-router"

[functions]

  [functions."*"]

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
  X-XSS-Protection = "1; mode=block"
  Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
  Cross-Origin-Opener-Policy = "same-origin"
  Cross-Origin-Resource-Policy = "same-origin"
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://*.netlify.app https://*.safeschool.fr https://*.safeschool.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

[[headers]]
for = "/*.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"

[[headers]]
for = "/*.js"

  [headers.values]
  Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Service-Worker-Allowed = "/"

[[headers]]
for = "/manifest.json"

  [headers.values]
  Cache-Control = "public, max-age=86400"
  Content-Type = "application/manifest+json"

[[headers]]
for = "/icons/*.svg"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
  Content-Type = "image/svg+xml"

[[headers]]
for = "/*.woff2"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/icons/*.png"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/i18n-translations.js"

  [headers.values]
  Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
for = "/api/*"

  [headers.values]
  Cache-Control = "no-store, no-cache, must-revalidate"
  Pragma = "no-cache"

[[headers]]
for = "/offline.html"

  [headers.values]
  Cache-Control = "public, max-age=86400"

