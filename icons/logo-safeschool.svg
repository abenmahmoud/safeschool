<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#312e81" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="white" opacity="0.04"/>
  <circle cx="440" cy="440" r="100" fill="white" opacity="0.04"/>

  <!-- Shield shape -->
  <g filter="shadow" transform="translate(256, 240)">
    <!-- Shield body -->
    <path d="M0 -148 L120 -100 L120 20 Q120 130 0 170 Q-120 130 -120 20 L-120 -100 Z" fill="url(#shield)" opacity="0.95"/>
    <!-- Shield outline glow -->
    <path d="M0 -148 L120 -100 L120 20 Q120 130 0 170 Q-120 130 -120 20 L-120 -100 Z" fill="none" stroke="white" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Heart inside shield -->
  <g transform="translate(256, 225)" filter="glow">
    <path d="M0 32 Q-8 24 -28 8 Q-52 -12 -52 -36 Q-52 -56 -36 -56 Q-20 -56 0 -36 Q20 -56 36 -56 Q52 -56 52 -36 Q52 -12 28 8 Q8 24 0 32 Z" fill="url(#heart)" transform="scale(1.4)"/>
  </g>

  <!-- Checkmark over heart -->
  <g transform="translate(256, 218)">
    <path d="M-16 4 L-4 16 L20 -12" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.3)"/>
  </g>

  <!-- Text "SafeSchool" -->
  <text x="256" y="430" text-anchor="middle" font-family="'Nunito', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="1">SafeSchool</text>

  <!-- Subtitle line -->
  <rect x="176" y="442" width="160" height="2" rx="1" fill="white" opacity="0.4"/>
</svg>
