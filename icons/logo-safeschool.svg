<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <linearGradient id="heart-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="shadow-main" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-heart" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-check" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Clipped background -->
  <g clip-path="url(#roundRect)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle geometric decorations (modern, minimal) -->
    <circle cx="60" cy="60" r="140" fill="white" opacity="0.035"/>
    <circle cx="460" cy="460" r="120" fill="white" opacity="0.035"/>
    <circle cx="400" cy="80" r="60" fill="white" opacity="0.025"/>
    <circle cx="100" cy="420" r="50" fill="white" opacity="0.025"/>

    <!-- Subtle grid pattern for depth -->
    <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-width="0.5" opacity="0.04"/>
    <line x1="0" y1="340" x2="512" y2="340" stroke="white" stroke-width="0.5" opacity="0.04"/>
    <line x1="170" y1="0" x2="170" y2="512" stroke="white" stroke-width="0.5" opacity="0.04"/>
    <line x1="340" y1="0" x2="340" y2="512" stroke="white" stroke-width="0.5" opacity="0.04"/>
  </g>

  <!-- Shield shape (centered, modern proportions) -->
  <g filter="url(#shadow-main)" transform="translate(256, 220)">
    <!-- Shield body with rounded bottom -->
    <path d="M0 -140 C20 -140 100 -115 115 -95 L115 15 C115 90 70 140 0 165 C-70 140 -115 90 -115 15 L-115 -95 C-100 -115 -20 -140 0 -140 Z" fill="url(#shield-fill)" opacity="0.95"/>
    <!-- Thin accent border -->
    <path d="M0 -140 C20 -140 100 -115 115 -95 L115 15 C115 90 70 140 0 165 C-70 140 -115 90 -115 15 L-115 -95 C-100 -115 -20 -140 0 -140 Z" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
    <!-- Inner subtle border for depth -->
    <path d="M0 -130 C18 -130 92 -107 105 -89 L105 13 C105 82 64 128 0 152 C-64 128 -105 82 -105 13 L-105 -89 C-92 -107 -18 -130 0 -130 Z" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Heart inside shield (bigger, centered) -->
  <g transform="translate(256, 210)" filter="url(#glow-heart)">
    <path d="M0 38 Q-10 28 -32 10 Q-58 -16 -58 -42 Q-58 -64 -40 -64 Q-22 -64 0 -42 Q22 -64 40 -64 Q58 -64 58 -42 Q58 -16 32 10 Q10 28 0 38 Z" fill="url(#heart-grad)" transform="scale(1.35)"/>
  </g>

  <!-- Checkmark over heart (bold, confident) -->
  <g transform="translate(256, 203)" filter="url(#glow-check)">
    <path d="M-18 5 L-5 18 L22 -14" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.3)"/>
  </g>

  <!-- Small stars/sparkles for modern touch -->
  <g opacity="0.6">
    <!-- Star top-right of shield -->
    <g transform="translate(340, 115)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Star top-left -->
    <g transform="translate(168, 135) scale(0.7)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- Small dot accents -->
    <circle cx="380" cy="160" r="3" fill="white" opacity="0.5"/>
    <circle cx="145" cy="180" r="2" fill="white" opacity="0.4"/>
  </g>

  <!-- Text "SafeSchool" — modern, bold -->
  <text x="256" y="432" text-anchor="middle" font-family="'Nunito','Segoe UI',Arial,sans-serif" font-weight="900" font-size="54" fill="white" letter-spacing="2">SafeSchool</text>

  <!-- Accent underline -->
  <rect x="170" y="446" width="172" height="3" rx="1.5" fill="url(#heart-grad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="256" y="472" text-anchor="middle" font-family="'Inter','DM Sans',sans-serif" font-weight="500" font-size="16" fill="white" opacity="0.7" letter-spacing="3">SAFE &bull; CONFIDENTIEL &bull; BIENVEILLANT</text>
</svg>
