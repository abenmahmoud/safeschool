  <g transform="translate(256, 218)" filter="url(#glow)">
    <path d="M0 32 Q-8 24 -28 8 Q-52 -12 -52 -36 Q-52 -56 -36 -56 Q-20 -56 0 -36 Q20 -56 36 -56 Q52 -56 52 -36 Q52 -12 28 8 Q8 24 0 32 Z" fill="url(#ht)" transform="scale(1.4)"/>
  </g>
  <g transform="translate(256, 210)">
    <path d="M-16 4 L-4 16 L20 -12" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.3)"/>
  </g>
